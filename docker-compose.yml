version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: safecity
      POSTGRES_PASSWORD: safecity_password
      POSTGRES_DB: safecity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://safecity:safecity_password@postgres:5432/safecity
      # Twilio configurations can be injected here
      - TWILIO_ACCOUNT_SID=
      - TWILIO_AUTH_TOKEN=
      - TWILIO_PHONE_NUMBER=
      - DESTINATION_PHONE=
    volumes:
      - ./backend/avatars:/app/avatars
      - ./backend/events:/app/events
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
