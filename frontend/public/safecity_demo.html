
<style>
*{box-sizing:border-box;margin:0;padding:0}
#wrap{display:flex;flex-direction:column;width:100%;background:#0d0d0d;font-family:'Courier New',monospace}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:#111;border-bottom:1px solid #1e1e1e}
.logo{font-size:13px;font-weight:700;color:#00e5ff;letter-spacing:2px}
.live{display:flex;align-items:center;gap:7px;font-size:10px;color:#777}
.dot{width:7px;height:7px;border-radius:50%;background:#00e676;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
#main{display:flex}
#fw{flex:1;position:relative;background:#000;overflow:hidden}
canvas{display:block}
#otl{position:absolute;top:8px;left:8px;font-size:9px;color:#00e5ff;background:rgba(0,0,0,.7);padding:3px 8px;border:1px solid #00e5ff33;border-radius:2px;letter-spacing:1px}
#fps{position:absolute;top:8px;right:8px;font-size:10px;color:#00e676;background:rgba(0,0,0,.7);padding:3px 8px;border:1px solid #00e67633;border-radius:2px}
#vbadge{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:900;padding:9px 24px;border:2px solid;border-radius:3px;letter-spacing:2px;display:none;animation:fl .35s infinite alternate;white-space:nowrap;background:rgba(0,0,0,.88)}
.vbv{color:#ff1744;border-color:#ff1744}
.vbc{color:#ff9100;border-color:#ff9100}
@keyframes fl{from{opacity:1}to{opacity:.2}}
#sb{width:215px;background:#0f0f0f;border-left:1px solid #1a1a1a;display:flex;flex-direction:column}
#stl{font-size:9px;color:#444;padding:7px 11px;border-bottom:1px solid #1a1a1a;letter-spacing:2px}
#elog{flex:1;overflow-y:auto;padding:5px;max-height:360px}
.ei{padding:6px 8px;border-radius:3px;margin-bottom:4px;font-size:9px;border-left:3px solid transparent;animation:sin .25s ease}
@keyframes sin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.ev{background:rgba(255,23,68,.13);border-color:#ff1744;color:#ff8a80}
.ec{background:rgba(255,145,0,.13);border-color:#ff9100;color:#ffcc80}
.ep{background:rgba(0,229,255,.08);border-color:#00e5ff;color:#80d8ff}
.eca{background:rgba(255,234,0,.08);border-color:#ffea00;color:#fff9c4}
.et{background:rgba(0,230,118,.07);border-color:#00e676;color:#b9f6ca}
.etime{color:#444;font-size:8px;display:block;margin-top:2px}
#tline{width:100%;height:5px;background:#181818;border-top:1px solid #1e1e1e}
#tfill{height:100%;background:#00e5ff;width:0%;transition:width .08s}
#bot{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:#0c0c0c;border-top:1px solid #1a1a1a}
#stats{display:flex;gap:16px}
.sv{font-size:15px;font-weight:700;color:#00e5ff}
.sl{font-size:8px;color:#444;letter-spacing:1px;margin-top:1px}
#ctls{display:flex;gap:7px}
button{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;font-size:9px;padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;letter-spacing:1px}
button:hover{background:#222;color:#eee}
button.on{border-color:#00e5ff;color:#00e5ff}
</style>

<div id="wrap">
  <h2 class="sr-only">SafeCity AI — person tracking, vehicle crash detection, violence alert demo</h2>
  <div id="topbar">
    <div class="logo">SAFECITY AI</div>
    <div class="live"><div class="dot"></div><span>LIVE — CAM_04 / SECTOR 7 / DOWNTOWN JUNCTION</span></div>
    <div style="font-size:9px;color:#333" id="clk">--:--:--</div>
  </div>
  <div id="main">
    <div id="fw">
      <canvas id="c" width="760" height="370"></canvas>
      <div id="otl">YOLOv8 + DeepSORT ▪ TRT-FP16 ▪ LIVE</div>
      <div id="fps">49 FPS</div>
      <div id="vbadge"></div>
    </div>
    <div id="sb">
      <div id="stl">Event Log</div>
      <div id="elog"></div>
    </div>
  </div>
  <div id="tline"><div id="tfill"></div></div>
  <div id="bot">
    <div id="stats">
      <div><div class="sv" id="spe">0</div><div class="sl">PERSONS</div></div>
      <div><div class="sv" id="sve">0</div><div class="sl">VEHICLES</div></div>
      <div><div class="sv" id="see">0</div><div class="sl">EVENTS</div></div>
      <div><div class="sv" id="sfe">--</div><div class="sl">CONF</div></div>
    </div>
    <div id="ctls">
      <button class="on" id="bp">⏸ PAUSE</button>
      <button id="br">↺ RESET</button>
    </div>
  </div>
</div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=760,H=370;
cv.width=W;cv.height=H;

let frame=0,running=true,evtCount=0,alertTimer=0,alertMsg='',alertCls='';
let phaseT=0,crashPhase=false,violPhase=false,lastCrashF=-999,lastViolF=-999;
let crashFX=0,crashFY=0,crashSparks=[];

// ── draw a person silhouette at (x,y), facing direction ──
function drawPerson(x,y,col,label,conf,fight,famt){
  const s=26;
  cx.save();cx.translate(x,y);
  if(fight&&famt>0.15){
    cx.fillStyle='rgba(255,23,68,'+(famt*0.2)+')';
    cx.beginPath();cx.ellipse(0,0,s*0.9,s*1.3,0,0,Math.PI*2);cx.fill();
  }
  const jx=fight?(Math.random()-.5)*famt*8:0;
  const jy=fight?(Math.random()-.5)*famt*5:0;
  cx.translate(jx,jy);
  const c=fight?'#ff1744':col;
  // head
  cx.fillStyle=c;cx.beginPath();cx.arc(0,-s*.78,s*.17,0,Math.PI*2);cx.fill();
  // body
  cx.strokeStyle=c;cx.lineWidth=s*.09;
  cx.beginPath();cx.moveTo(0,-s*.61);cx.lineTo(0,-s*.18);cx.stroke();
  // arms
  cx.beginPath();cx.moveTo(-s*.28,-s*.48);cx.lineTo(s*.28,-s*.48);cx.stroke();
  // legs
  cx.beginPath();cx.moveTo(0,-s*.18);cx.lineTo(-s*.2,s*.28);cx.stroke();
  cx.beginPath();cx.moveTo(0,-s*.18);cx.lineTo(s*.2,s*.28);cx.stroke();
  // bbox
  const bw=s*1.05,bh=s*1.15,bx=-bw/2,by=-s*.96;
  cx.strokeStyle=c;cx.lineWidth=fight?2:1.3;cx.strokeRect(bx,by,bw,bh);
  const cs=5;
  cx.lineWidth=1;cx.beginPath();
  cx.moveTo(bx,by+cs);cx.lineTo(bx,by);cx.lineTo(bx+cs,by);
  cx.moveTo(bx+bw-cs,by);cx.lineTo(bx+bw,by);cx.lineTo(bx+bw,by+cs);
  cx.moveTo(bx,by+bh-cs);cx.lineTo(bx,by+bh);cx.lineTo(bx+cs,by+bh);
  cx.moveTo(bx+bw-cs,by+bh);cx.lineTo(bx+bw,by+bh);cx.lineTo(bx+bw,by+bh-cs);
  cx.stroke();
  // tag
  const tw=bw+22,th=13;
  cx.fillStyle=c;cx.fillRect(bx,by-th,tw,th);
  cx.fillStyle='#000';cx.font='bold 7.5px Courier New';
  cx.fillText((fight?'⚠ PERSON':'PERSON')+' '+label+'  '+conf,bx+3,by-4);
  cx.restore();
}

// ── draw a car top-down view at (x,y) moving horizontally ──
function drawCar(x,y,col,label,conf,crashed,camt){
  const cw=52,ch=26;
  cx.save();cx.translate(x,y);
  if(crashed&&camt>0.1){
    cx.fillStyle='rgba(255,145,0,'+(camt*0.22)+')';
    cx.beginPath();cx.ellipse(0,0,cw*.9,ch*1.2,0,0,Math.PI*2);cx.fill();
  }
  const jx=crashed?(Math.random()-.5)*camt*6:0;
  const jy=crashed?(Math.random()-.5)*camt*4:0;
  cx.translate(jx,jy);
  const cc=crashed?'#ff9100':col;
  // car body fill
  cx.fillStyle=cc+'18';cx.fillRect(-cw/2,-ch/2,cw,ch);
  // windshield front
  cx.fillStyle=cc+'28';cx.fillRect(cw*.1,-ch*.35,cw*.28,ch*.7);
  // windshield rear
  cx.fillStyle=cc+'18';cx.fillRect(-cw*.38,-ch*.32,cw*.22,ch*.64);
  // body outline
  cx.strokeStyle=cc;cx.lineWidth=1.6;cx.strokeRect(-cw/2,-ch/2,cw,ch);
  // roof
  cx.strokeStyle=cc+'99';cx.lineWidth=1;cx.strokeRect(-cw*.15,-ch*.45,cw*.5,ch*.9);
  // wheels (4 corners)
  const wr=4.5;
  [[-cw*.38,-ch*.5],[cw*.3,-ch*.5],[-cw*.38,ch*.5-wr],[cw*.3,ch*.5-wr]].forEach(([wx,wy])=>{
    cx.fillStyle='#1a1a1a';cx.beginPath();cx.arc(wx,wy,wr,0,Math.PI*2);cx.fill();
    cx.strokeStyle=cc+'88';cx.lineWidth=1;cx.stroke();
  });
  // headlights
  if(!crashed){
    cx.fillStyle=cc+'99';cx.fillRect(cw/2-3,-ch*.35,3,8);cx.fillRect(cw/2-3,ch*.12,3,8);
  }
  // bbox
  const bw2=cw+14,bh2=ch+10,bx2=-bw2/2,by2=-bh2/2;
  cx.strokeStyle=cc;cx.lineWidth=crashed?2:1.2;cx.strokeRect(bx2,by2,bw2,bh2);
  const cs=5;cx.lineWidth=1;cx.beginPath();
  cx.moveTo(bx2,by2+cs);cx.lineTo(bx2,by2);cx.lineTo(bx2+cs,by2);
  cx.moveTo(bx2+bw2-cs,by2);cx.lineTo(bx2+bw2,by2);cx.lineTo(bx2+bw2,by2+cs);
  cx.moveTo(bx2,by2+bh2-cs);cx.lineTo(bx2,by2+bh2);cx.lineTo(bx2+cs,by2+bh2);
  cx.moveTo(bx2+bw2-cs,by2+bh2);cx.lineTo(bx2+bw2,by2+bh2);cx.lineTo(bx2+bw2,by2+bh2-cs);
  cx.stroke();
  const tw=bw2+20,th=13;
  cx.fillStyle=cc;cx.fillRect(bx2,by2-th,tw,th);
  cx.fillStyle='#000';cx.font='bold 7.5px Courier New';
  cx.fillText((crashed?'⚡ CAR':'CAR')+' '+label+'  '+conf,bx2+3,by2-4);
  cx.restore();
}

// ── spark particles for crash ──
function spawnSparks(x,y){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2;
    const sp=1.5+Math.random()*3.5;
    crashSparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col:['#ff9100','#ffea00','#ff5722','#fff'][Math.floor(Math.random()*4)]});
  }
}
function updateDrawSparks(){
  cx.save();
  crashSparks=crashSparks.filter(s=>s.life>0.05);
  crashSparks.forEach(s=>{
    s.x+=s.vx;s.y+=s.vy;s.life-=0.04;s.vy+=0.08;
    cx.globalAlpha=s.life;
    cx.fillStyle=s.col;
    cx.beginPath();cx.arc(s.x,s.y,1.5,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;cx.restore();
}

// ── scene objects ──
let persons=[],cars=[];

function mkPersons(){
  persons=[
    {x:80, y:160, vx:0.38, vy:0.15, col:'#00e5ff', label:'ID_P01', trail:[], fight:false, famt:0},
    {x:240,y:200, vx:-0.28,vy:0.2,  col:'#76ff03', label:'ID_P02', trail:[], fight:false, famt:0},
    {x:90, y:280, vx:0.2,  vy:-0.12,col:'#ea80fc', label:'ID_P03', trail:[], fight:false, famt:0},
  ];
}
function mkCars(){
  // car0 moves right→left, car1 moves left→right — they're on crossing paths
  cars=[
    {x:680, y:105, vx:-1.1, vy:0,    col:'#ffea00', label:'ID_C01', trail:[], crashed:false, camt:0},
    {x:60,  y:105, vx:1.05, vy:0,    col:'#ff6d00', label:'ID_C02', trail:[], crashed:false, camt:0},
  ];
}
mkPersons();mkCars();

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function updatePerson(p,fight){
  p.fight=fight;
  if(fight){p.famt=Math.min(1,p.famt+.07);p.x+=(Math.random()-.5)*9*p.famt;p.y+=(Math.random()-.5)*6*p.famt;}
  else{p.famt=Math.max(0,p.famt-.04);p.x+=p.vx;p.y+=p.vy;
    if(p.x<30){p.vx=Math.abs(p.vx);p.x=30;}if(p.x>360){p.vx=-Math.abs(p.vx);p.x=360;}
    if(p.y<140){p.vy=Math.abs(p.vy);p.y=140;}if(p.y>320){p.vy=-Math.abs(p.vy);p.y=320;}
  }
  p.trail.push({x:p.x,y:p.y});if(p.trail.length>20)p.trail.shift();
  p.conf=(0.83+Math.random()*.15).toFixed(2);
}

function updateCar(c,crash){
  c.crashed=crash;
  if(crash){c.camt=Math.min(1,c.camt+.06);c.x+=(Math.random()-.5)*5*c.camt;c.y+=(Math.random()-.5)*4*c.camt;}
  else{c.camt=Math.max(0,c.camt-.04);c.x+=c.vx;c.y+=c.vy;
    if(c.x<50){c.vx=Math.abs(c.vx);c.x=50;}if(c.x>720){c.vx=-Math.abs(c.vx);c.x=720;}
    if(c.y<75){c.vy=Math.abs(c.vy);c.y=75;}if(c.y>135){c.vy=-Math.abs(c.vy);c.y=135;}
  }
  c.trail.push({x:c.x,y:c.y});if(c.trail.length>22)c.trail.shift();
  c.conf=(0.79+Math.random()*.18).toFixed(2);
}

function drawTrail(trail,col,crash){
  if(trail.length<2)return;
  cx.beginPath();cx.moveTo(trail[0].x,trail[0].y);
  trail.forEach(p=>cx.lineTo(p.x,p.y));
  cx.strokeStyle=(crash?'#ff9100':col)+'28';cx.lineWidth=1;cx.stroke();
}

function drawBg(){
  cx.fillStyle='#06080b';cx.fillRect(0,0,W,H);
  // grid
  cx.strokeStyle='#0b1015';cx.lineWidth=1;
  for(let x=0;x<W;x+=50){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
  for(let y=0;y<H;y+=50){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  // road lane — horizontal band where cars drive
  cx.fillStyle='#0a0e12';cx.fillRect(0,75,W,75);
  cx.strokeStyle='#141c22';cx.lineWidth=1;cx.strokeRect(0,75,W,75);
  // dashed centre line
  cx.strokeStyle='#1a2830';cx.lineWidth=1.5;cx.setLineDash([18,12]);
  cx.beginPath();cx.moveTo(0,112);cx.lineTo(W,112);cx.stroke();cx.setLineDash([]);
  // road label
  cx.fillStyle='#0e1820';cx.font='8px Courier New';cx.fillText('ROAD LANE — SECTOR 7 EAST CORRIDOR',18,90);
  // pavement
  cx.fillStyle='#080c10';cx.fillRect(0,0,W,75);cx.fillRect(0,150,W,H-150);
  // bottom bar
  cx.fillStyle='#080c10';cx.fillRect(0,H-28,W,28);
  cx.fillStyle='#131e27';cx.fillRect(0,H-30,W,2);
  cx.fillStyle='#162030';cx.font='8px Courier New';
  const ts=new Date().toISOString().replace('T',' ').slice(0,19)+' UTC';
  cx.fillText('REC ● '+ts,12,H-11);
  cx.fillText('CAM_04 / AXIS-Q6135 / 1920×1080@50fps / SECTOR-7',200,H-11);
  cx.fillStyle='#ff1744';cx.beginPath();cx.arc(W-26,H-17,3.5,0,Math.PI*2);cx.fill();
  cx.fillStyle='#662222';cx.font='8px Courier New';cx.fillText('REC',W-19,H-13);
  cx.strokeStyle='#0c151c';cx.lineWidth=1;cx.strokeRect(12,12,W-24,H-24);
}

function drawInference(vfight,ccrash){
  const lines=[
    'INFERENCE : yolov8m.pt + TRT-FP16',
    'TRACKER   : DeepSORT / Kalman+IOU',
    'OBJECTS   : '+(persons.length+cars.length)+'   FRAME: '+String(frame).padStart(6,'0'),
    vfight?'⚠ VIOLENCE : PERSONS [CONF:'+(0.88+Math.random()*.1).toFixed(3)+']':
    ccrash?'⚡ CRASH   : VEHICLES [CONF:'+(0.91+Math.random()*.08).toFixed(3)+']':
    'STATUS    : MONITORING',
  ];
  lines.forEach((l,i)=>{
    cx.fillStyle=i===3&&vfight?'rgba(255,82,82,.85)':i===3&&ccrash?'rgba(255,145,0,.85)':'rgba(0,229,255,.38)';
    cx.font='8.5px Courier New';cx.fillText(l,20,32+i*13);
  });
}

function heatPerson(x,y,r){
  const g=cx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,'rgba(255,23,68,0.22)');g.addColorStop(1,'rgba(255,23,68,0)');
  cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();
}
function heatCar(x,y){
  const g=cx.createRadialGradient(x,y,0,x,y,70);
  g.addColorStop(0,'rgba(255,145,0,0.28)');g.addColorStop(1,'rgba(255,145,0,0)');
  cx.fillStyle=g;cx.beginPath();cx.arc(x,y,70,0,Math.PI*2);cx.fill();
}

function addLog(cls,msg){
  const d=document.createElement('div');
  d.className='ei '+cls;
  const t=new Date().toLocaleTimeString('en-US',{hour12:false});
  d.innerHTML=msg+'<span class="etime">'+t+'</span>';
  const el=document.getElementById('elog');
  el.insertBefore(d,el.firstChild);
  if(el.children.length>26)el.removeChild(el.lastChild);
}

function showBadge(msg,cls){
  const b=document.getElementById('vbadge');
  b.textContent=msg;b.className=cls;b.style.display='block';
}
function hideBadge(){document.getElementById('vbadge').style.display='none';}

// phase controller — alternates between car crash and person violence
// 0-200: normal   200-380: crash   380-520: normal   520-680: violence   680-800: normal
let pViol=false,pCrash=false;

function tick(){
  if(!running){requestAnimationFrame(tick);return;}
  frame++;phaseT++;
  if(phaseT>800)phaseT=0;

  pCrash = phaseT>180 && phaseT<370;
  pViol  = phaseT>500 && phaseT<680;

  // steer car1 toward car0 during crash phase
  if(pCrash){
    const c0=cars[0],c1=cars[1];
    c0.x+=(c1.x-c0.x)*.018;
    c0.y+=(c1.y-c0.y)*.012;
  }
  // steer person0 toward person1 during violence phase
  if(pViol){
    const p0=persons[0],p1=persons[1];
    p0.x+=(p1.x-p0.x)*.016;
    p0.y+=(p1.y-p0.y)*.012;
  }

  const carCrash  = pCrash && dist(cars[0],cars[1])<60;
  const personFight = pViol && dist(persons[0],persons[1])<70;

  persons.forEach((p,i)=>updatePerson(p,personFight&&i<2));
  cars.forEach((c,i)=>updateCar(c,carCrash));

  // crash event
  if(carCrash&&frame-lastCrashF>55){
    lastCrashF=frame;evtCount++;
    crashFX=(cars[0].x+cars[1].x)/2;crashFY=(cars[0].y+cars[1].y)/2;
    spawnSparks(crashFX,crashFY);
    alertTimer=110;showBadge('⚡ ACCIDENT DETECTED','vbadge vbc');
    addLog('ec','⚡ CRASH — ID_C01 × ID_C02');
    document.getElementById('see').textContent=evtCount;
    document.getElementById('sfe').textContent=(91+Math.random()*7).toFixed(1)+'%';
  }
  // violence event
  if(personFight&&frame-lastViolF>55){
    lastViolF=frame;evtCount++;
    alertTimer=100;showBadge('⚠ VIOLENCE DETECTED','vbadge vbv');
    addLog('ev','⚠ VIOLENCE — ID_P01 × ID_P02');
    document.getElementById('see').textContent=evtCount;
    document.getElementById('sfe').textContent=(88+Math.random()*9).toFixed(1)+'%';
  }
  if(alertTimer>0)alertTimer--;
  else hideBadge();

  if(frame%120===9) addLog('ep','+ PERSON DETECTED — ID_P0'+(1+Math.floor(Math.random()*3)));
  if(frame%100===5) addLog('eca','+ VEHICLE DETECTED — ID_C0'+(1+Math.floor(Math.random()*2)));
  if(frame%65===3)  addLog('et','✓ TRACK CONFIRMED — '+(8+Math.floor(Math.random()*55))+' frames');

  // ── DRAW ──
  drawBg();

  const scanY=((frame*1.6)%(H+8))-4;
  cx.fillStyle='rgba(0,229,255,.016)';cx.fillRect(0,scanY,W,2);

  if(carCrash) heatCar(crashFX,crashFY);
  if(personFight) heatPerson((persons[0].x+persons[1].x)/2,(persons[0].y+persons[1].y)/2,80);

  // distance lines
  if(carCrash||dist(cars[0],cars[1])<200){
    cx.strokeStyle=carCrash?'rgba(255,145,0,.65)':'rgba(255,234,0,.14)';
    cx.lineWidth=carCrash?1.8:.7;cx.setLineDash(carCrash?[5,3]:[3,6]);
    cx.beginPath();cx.moveTo(cars[0].x,cars[0].y);cx.lineTo(cars[1].x,cars[1].y);cx.stroke();
    cx.setLineDash([]);
    if(carCrash){cx.fillStyle='#ffcc80';cx.font='8px Courier New';cx.fillText(Math.round(dist(cars[0],cars[1]))+'px',(cars[0].x+cars[1].x)/2+3,(cars[0].y+cars[1].y)/2-4);}
  }
  if(personFight||dist(persons[0],persons[1])<160){
    cx.strokeStyle=personFight?'rgba(255,23,68,.65)':'rgba(0,229,255,.12)';
    cx.lineWidth=personFight?1.8:.7;cx.setLineDash(personFight?[5,3]:[3,6]);
    cx.beginPath();cx.moveTo(persons[0].x,persons[0].y);cx.lineTo(persons[1].x,persons[1].y);cx.stroke();
    cx.setLineDash([]);
  }

  // draw trails
  cars.forEach(c=>drawTrail(c.trail,c.col,c.crashed));
  persons.forEach(p=>drawTrail(p.trail,p.col,p.fight));

  // draw cars
  cars.forEach((c,i)=>drawCar(c.x,c.y,c.col,c.label,c.conf+'',c.crashed,c.camt));

  // draw persons (below road = on pavement)
  persons.forEach((p,i)=>drawPerson(p.x,p.y,p.col,p.label,p.conf+'',p.fight,p.famt));

  updateDrawSparks();
  drawInference(personFight,carCrash);

  if(frame%25===0){
    document.getElementById('fps').textContent=(44+Math.floor(Math.random()*10))+' FPS';
    document.getElementById('spe').textContent=persons.length;
    document.getElementById('sve').textContent=cars.length;
    if(!carCrash&&!personFight)document.getElementById('sfe').textContent='--';
  }

  const pct=((phaseT/800)*100).toFixed(1);
  document.getElementById('tfill').style.width=pct+'%';
  document.getElementById('clk').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});

  requestAnimationFrame(tick);
}

document.getElementById('bp').addEventListener('click',function(){
  running=!running;this.textContent=running?'⏸ PAUSE':'▶ RESUME';this.classList.toggle('on',running);
});
document.getElementById('br').addEventListener('click',function(){
  frame=0;phaseT=0;evtCount=0;alertTimer=0;crashSparks=[];
  hideBadge();document.getElementById('elog').innerHTML='';
  document.getElementById('see').textContent='0';document.getElementById('sfe').textContent='--';
  mkPersons();mkCars();
  addLog('et','✓ SYSTEM RESET — 3 persons, 2 vehicles');
});

addLog('et','✓ SYSTEM INITIALIZED — 3 persons + 2 vehicles');
addLog('eca','+ VEHICLE DETECTED — ID_C01, ID_C02');
addLog('ep','+ PERSON DETECTED — ID_P01, ID_P02, ID_P03');
tick();
</script>
