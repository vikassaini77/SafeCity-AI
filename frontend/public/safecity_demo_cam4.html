<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
#wrap{display:flex;flex-direction:column;width:100%;height:100vh;background:#0d0d0d;font-family:'Courier New',monospace}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:#111;border-bottom:1px solid #1e1e1e}
.logo{font-size:13px;font-weight:700;color:#00e5ff;letter-spacing:2px}
.live{display:flex;align-items:center;gap:7px;font-size:10px;color:#777}
.dot{width:7px;height:7px;border-radius:50%;background:#00e676;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
#main{display:flex;flex:1;min-height:0}
#fw{flex:1;position:relative;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;max-width:100%;max-height:100%;object-fit:contain}
#otl{position:absolute;top:8px;left:8px;font-size:9px;color:#00e5ff;background:rgba(0,0,0,.7);padding:3px 8px;border:1px solid #00e5ff33;border-radius:2px;letter-spacing:1px}
#fps{position:absolute;top:8px;right:8px;font-size:10px;color:#00e676;background:rgba(0,0,0,.7);padding:3px 8px;border:1px solid #00e67633;border-radius:2px}
#vbadge{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:900;padding:9px 24px;border:2px solid;border-radius:3px;letter-spacing:2px;display:none;animation:fl .35s infinite alternate;white-space:nowrap;background:rgba(0,0,0,.88)}
.vbc{color:#ff9100;border-color:#ff9100}
.vbv{color:#ff1744;border-color:#ff1744}
@keyframes fl{from{opacity:1}to{opacity:.2}}
#sb{width:215px;background:#0f0f0f;border-left:1px solid #1a1a1a;display:flex;flex-direction:column}
#stl{font-size:9px;color:#444;padding:7px 11px;border-bottom:1px solid #1a1a1a;letter-spacing:2px}
#elog{flex:1;overflow-y:auto;padding:5px}
.ei{padding:6px 8px;border-radius:3px;margin-bottom:4px;font-size:9px;border-left:3px solid transparent;animation:sin .25s ease}
@keyframes sin{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.ev{background:rgba(255,23,68,.13);border-color:#ff1744;color:#ff8a80}
.ec{background:rgba(255,145,0,.13);border-color:#ff9100;color:#ffcc80}
.ep{background:rgba(0,229,255,.08);border-color:#00e5ff;color:#80d8ff}
.eca{background:rgba(255,234,0,.08);border-color:#ffea00;color:#fff9c4}
.et{background:rgba(0,230,118,.07);border-color:#00e676;color:#b9f6ca}
.etime{color:#444;font-size:8px;display:block;margin-top:2px}
#bot{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:#0c0c0c;border-top:1px solid #1a1a1a}
#stats{display:flex;gap:16px}
.sv{font-size:15px;font-weight:700;color:#00e5ff}
.sl{font-size:8px;color:#444;letter-spacing:1px;margin-top:1px}
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div class="logo">SAFECITY AI</div>
    <div class="live"><div class="dot"></div><span>LIVE — CAM_04 / MAIN LOBBY</span></div>
    <div style="font-size:9px;color:#333" id="clk">--:--:--</div>
  </div>
  <div id="main">
    <div id="fw">
      <canvas id="c" width="760" height="370"></canvas>
      <div id="otl">YOLOv8 + DeepSORT ▪ INDOOR</div>
      <div id="fps">49 FPS</div>
      <div id="vbadge"></div>
    </div>
    <div id="sb">
      <div id="stl">Event Log</div>
      <div id="elog"></div>
    </div>
  </div>
  <div id="bot">
    <div id="stats">
      <div><div class="sv" id="spe">0</div><div class="sl">PERSONS</div></div>
      <div><div class="sv" id="sve">0</div><div class="sl">BAGS</div></div>
      <div><div class="sv" id="see">0</div><div class="sl">EVENTS</div></div>
    </div>
  </div>
</div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=760,H=370;

let frame=0, phaseT=0, evtCount=0, bagTimer=0;
let person = {x: -20, y: 190, vx: 1.5, vy: 0.2, hasBag: true};
let bag = {x: -999, y: -999, active: false, alert: false};

function drawBag(x,y,col,label,alert) {
  const s=12; cx.save(); cx.translate(x,y);
  const c = alert ? '#ff1744' : col;
  
  if(alert){
    const g=cx.createRadialGradient(0,0,0,0,0,30);
    g.addColorStop(0, 'rgba(255,23,68,0.4)');
    g.addColorStop(1,'transparent');
    cx.fillStyle=g; cx.beginPath(); cx.arc(0,0,30,0,Math.PI*2); cx.fill();
  }

  cx.fillStyle=c; cx.fillRect(-s,-s*0.8,s*2,s*1.6);
  cx.strokeStyle=c; cx.lineWidth=2; cx.beginPath(); cx.arc(0,-s*0.8,s*0.5,Math.PI,0); cx.stroke();

  const bw=s*2.5,bh=s*2.5,bx=-bw/2,by=-s*1.5;
  cx.strokeStyle=c; cx.lineWidth=alert?2:1.2; cx.strokeRect(bx,by,bw,bh);
  
  cx.fillStyle=c; cx.fillRect(bx,by-12,bw+30,12);
  cx.fillStyle='#000'; cx.font='bold 7px Courier New';
  cx.fillText(label+' '+(0.89+Math.random()*0.05).toFixed(2), bx+2, by-3);
  cx.restore();
}

function drawPerson(x,y,col,label) {
  const s=24; cx.save(); cx.translate(x,y);
  
  cx.fillStyle=col; cx.beginPath(); cx.arc(0,-s*.8,s*.15,0,Math.PI*2); cx.fill();
  cx.strokeStyle=col; cx.lineWidth=s*.1;
  cx.beginPath(); cx.moveTo(0,-s*.6); cx.lineTo(0,-s*.2); cx.stroke();
  cx.beginPath(); cx.moveTo(-s*.25,-s*.5); cx.lineTo(s*.25,-s*.5); cx.stroke();
  cx.beginPath(); cx.moveTo(0,-s*.2); cx.lineTo(-s*.15,s*.25); cx.stroke();
  cx.beginPath(); cx.moveTo(0,-s*.2); cx.lineTo(s*.15,s*.25); cx.stroke();

  const bw=s*1,bh=s*1.2,bx=-bw/2,by=-s;
  cx.strokeStyle=col; cx.lineWidth=1.2; cx.strokeRect(bx,by,bw,bh);
  cx.fillStyle=col; cx.fillRect(bx,by-12,bw+15,12);
  cx.fillStyle='#000'; cx.font='bold 7px Courier New';
  cx.fillText(label+' 0.95', bx+2, by-3);
  
  // draw bag if carried
  if(person.hasBag) {
    cx.fillStyle='#e91e63'; cx.fillRect(s*0.1, -s*0.5, 10, 12);
  }
  
  cx.restore();
}

function drawBg() {
  cx.fillStyle='#0c0c0c'; cx.fillRect(0,0,W,H);
  cx.strokeStyle='#111'; cx.lineWidth=1;
  // Floor tiles
  for(let x=0; x<W; x+=40) { cx.beginPath(); cx.moveTo(x,0); cx.lineTo(x,H); cx.stroke(); }
  for(let y=0; y<H; y+=40) { cx.beginPath(); cx.moveTo(0,y); cx.lineTo(W,y); cx.stroke(); }
  
  // Reception desk
  cx.fillStyle='#151515'; cx.fillRect(100,20,W-200,60);
  cx.strokeStyle='#222'; cx.lineWidth=2; cx.strokeRect(100,20,W-200,60);
  
  cx.fillStyle='#0e1820'; cx.font='10px Courier New'; cx.fillText('MAIN LOBBY - GROUND FLOOR', 20, 30);
  cx.fillStyle='#131e27'; cx.fillRect(0,H-28,W,28);
  cx.fillStyle='#162030'; cx.font='8px Courier New';
  cx.fillText('REC ● ' + new Date().toISOString().slice(0,19).replace('T',' '), 12, H-11);
}

function addLog(cls,msg) {
  const d=document.createElement('div'); d.className='ei '+cls;
  d.innerHTML=msg+'<span class="etime">'+new Date().toLocaleTimeString('en-US',{hour12:false})+'</span>';
  const el=document.getElementById('elog');
  el.insertBefore(d,el.firstChild);
  if(el.children.length>25) el.removeChild(el.lastChild);
}

function showBadge(msg,cls) {
  const b=document.getElementById('vbadge');
  b.textContent=msg; b.className=cls; b.style.display='block';
}

function tick() {
  frame++; phaseT++;
  if(phaseT > 900) {
    phaseT = 0; person = {x: -20, y: 190, vx: 1.5, vy: 0.2, hasBag: true};
    bag = {x: -999, y: -999, active: false, alert: false}; bagTimer=0;
    document.getElementById('elog').innerHTML='';
    document.getElementById('vbadge').style.display='none';
    addLog('et','✓ SYSTEM RESET');
  }

  drawBg();

  if (phaseT < 250) {
    person.x += person.vx; person.y += person.vy;
  } else if (phaseT === 250) {
    // drops bag
    person.hasBag = false;
    bag.active = true; bag.x = person.x + 15; bag.y = person.y + 10;
    addLog('eca', '+ BAGGAGE DETECTED - ID_B01');
  } else if (phaseT < 450) {
    // walks away
    person.x -= 1.5; person.y -= 0.5;
    bagTimer++;
    // trace line between person and bag
    cx.strokeStyle='rgba(0,229,255,0.4)'; cx.setLineDash([4,4]);
    cx.beginPath(); cx.moveTo(person.x, person.y); cx.lineTo(bag.x, bag.y); cx.stroke();
    cx.setLineDash([]);
    cx.fillStyle='#00e5ff'; cx.fillText('OWNER DIST: '+Math.round(Math.hypot(person.x-bag.x,person.y-bag.y))+'px', (person.x+bag.x)/2, (person.y+bag.y)/2);
  } else {
    // owner gone
    person.x = -999; bagTimer++;
    if(bagTimer > 300 && !bag.alert) {
      bag.alert = true;
      showBadge('⚡ UNATTENDED BAGGAGE','vbadge vbv');
      addLog('ev', '⚡ UNATTENDED BAGGAGE - ID_B01');
      evtCount++; document.getElementById('see').textContent=evtCount;
    }
  }

  if(bag.active) drawBag(bag.x, bag.y, '#e91e63', 'ID_B01', bag.alert);
  if(person.x > -20 && person.x < W+20) drawPerson(person.x, person.y, '#00e5ff', 'ID_P01');

  if(frame%30===0) {
    document.getElementById('fps').textContent=(45+Math.floor(Math.random()*10))+' FPS';
    document.getElementById('clk').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
    document.getElementById('spe').textContent = (person.x > 0 && person.x < W) ? '1' : '0';
    document.getElementById('sve').textContent = bag.active ? '1' : '0';
  }

  requestAnimationFrame(tick);
}

addLog('et','✓ SYSTEM INITIALIZED');
tick();
</script>
</body>
</html>
